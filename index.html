<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>一面謎いっぱい</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- PapaParse (CSV解析用) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <!-- CryptoJS (暗号化用) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        main: '#000000',
                        accent: '#00aeef',
                        text: '#ffffff',
                        grayed: '#555555'
                    }
                }
            }
        }
    </script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; color: #fff; user-select: none; font-family: sans-serif; }
        canvas { display: block; touch-action: none; }
        
        #landscape-warning { display: none; }
        @media screen and (orientation: portrait) {
            #landscape-warning { display: flex; }
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: #00aeef; border-radius: 4px; }
        
        .modal { transition: opacity 0.3s; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- 縦画面警告 -->
    <div id="landscape-warning" class="fixed inset-0 z-[100] bg-main flex flex-col items-center justify-center p-8 text-center">
        <svg class="w-16 h-16 text-accent mb-4 animate-pulse" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
        <h2 class="text-2xl font-bold mb-2">画面を横にしてください</h2>
        <p class="text-gray-400">このゲームは横画面でのプレイを推奨しています。</p>
    </div>

    <!-- ゲーム画面UI -->
    <div id="game-ui" class="fixed inset-0 pointer-events-none hidden z-10">
        <!-- 左上: 名前 -->
        <div class="absolute top-4 left-4 bg-black/50 px-4 py-2 rounded-lg border border-accent/30 pointer-events-auto">
            <span id="player-name-display" class="font-bold text-accent"></span>
        </div>

        <!-- 中央上: 現在のターゲット表示 -->
        <div id="current-target-display" class="absolute top-4 left-1/2 -translate-x-1/2 bg-black/70 px-6 py-3 rounded-full border border-accent/50 pointer-events-auto hidden flex items-center gap-3 shadow-lg">
            <span class="text-accent font-bold text-sm">SEARCHING:</span>
            <span id="target-text" class="font-bold text-lg"></span>
        </div>

        <!-- 右上: 正解数 & Xシェア -->
        <div class="absolute top-4 right-4 flex gap-2 pointer-events-auto items-center">
            <button id="btn-show-clear" onclick="openModal('modal-clear')" class="hidden bg-yellow-600/80 hover:bg-yellow-500 text-white font-bold px-3 py-2 rounded-lg border border-yellow-300 transition text-sm flex items-center gap-1 shadow-lg">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"></path></svg>
                クリア画面へ
            </button>
            <div class="bg-black/50 px-4 py-2 rounded-lg border border-accent/30 font-bold">
                <span id="score-display" class="text-accent">0</span> / <span id="total-display">0</span>
            </div>
            <button onclick="shareTwitter()" class="bg-black/50 hover:bg-accent/20 px-3 py-2 rounded-lg border border-accent/30 transition">
                <svg class="w-5 h-5 fill-current" viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
            </button>
        </div>

        <!-- 左下: 囲む・判定ボタン -->
        <div class="absolute bottom-4 left-4 flex flex-col gap-2 pointer-events-auto">
            <button id="btn-judge" onclick="judgeAnswer()" class="hidden bg-accent hover:bg-accent/80 text-white font-bold py-2 px-6 rounded-lg shadow-lg border border-white/20 transition">
                判定する
            </button>
            <button id="btn-admin-save" onclick="adminSaveData()" class="hidden bg-red-600 hover:bg-red-500 text-white font-bold py-2 px-6 rounded-lg shadow-lg border border-red-300 transition">
                設定を保存
            </button>
            <button id="btn-frame" onclick="toggleFramingMode()" class="bg-black/80 hover:bg-black text-white font-bold py-2 px-6 rounded-lg border border-accent/50 transition">
                囲む
            </button>
        </div>

        <!-- 中央下: 正方形ツール -->
        <div class="absolute bottom-4 left-1/2 -translate-x-1/2 flex gap-4 pointer-events-auto">
            <button onclick="toggleTool('frame')" id="btn-tool-frame" class="w-12 h-12 border-2 border-white bg-black/50 hover:bg-accent/30 transition rounded flex items-center justify-center tooltip relative">
                <div class="w-6 h-6 border-2 border-black bg-white/80"></div>
            </button>
            <button onclick="toggleTool('solid')" id="btn-tool-solid" class="w-12 h-12 border-2 border-white bg-black/50 hover:bg-accent/30 transition rounded flex items-center justify-center">
                <div class="w-6 h-6 bg-black border border-gray-500"></div>
            </button>
        </div>

        <!-- 右下: リストボタン -->
        <div class="absolute bottom-4 right-4 pointer-events-auto">
            <button onclick="openModal('modal-list')" class="bg-black/80 hover:bg-black text-white font-bold py-2 px-6 rounded-lg border border-accent/50 transition flex items-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                リスト
            </button>
        </div>
        
        <!-- 中央: アラート用 -->
        <div id="alert-msg" class="absolute top-1/4 left-1/2 -translate-x-1/2 bg-accent text-white px-6 py-3 rounded-full font-bold text-lg opacity-0 transition-opacity pointer-events-none shadow-lg z-50"></div>

        <!-- 管理者用ツールバー (隠し) -->
        <div id="admin-toolbar" class="hidden absolute top-16 left-4 bg-red-900/80 p-2 rounded border border-red-500 pointer-events-auto flex flex-col gap-2">
            <span class="text-xs font-bold text-red-300">管理者ツール</span>
            <button onclick="exportAdminData()" class="bg-red-600 hover:bg-red-500 text-sm px-4 py-2 rounded font-bold">解答データをまとめてDL</button>
        </div>
    </div>

    <!-- メインキャンバス -->
    <canvas id="gameCanvas" class="z-0"></canvas>

    <!-- モーダル: 名前入力 -->
    <div id="modal-name" class="modal fixed inset-0 bg-black/90 z-40 flex items-center justify-center">
        <div class="bg-gray-900 border border-accent p-8 rounded-xl max-w-sm w-full text-center shadow-[0_0_15px_rgba(0,174,239,0.3)]">
            <h2 class="text-2xl font-bold mb-6 text-accent">一面謎いっぱい</h2>
            <p class="mb-4 text-sm text-gray-300">プレイヤー名を入力してください</p>
            <input type="text" id="input-name" class="w-full bg-black border border-gray-600 rounded px-4 py-2 mb-6 text-white focus:outline-none focus:border-accent" placeholder="名前">
            <button onclick="startGame()" class="w-full bg-accent hover:bg-accent/80 font-bold py-2 px-4 rounded transition">開始</button>
        </div>
    </div>

    <!-- モーダル: 問題リスト -->
    <div id="modal-list" class="modal hidden fixed inset-0 bg-black/80 z-40 flex items-center justify-center p-4">
        <div class="bg-gray-900 border border-accent/50 rounded-xl w-full max-w-2xl max-h-[80vh] flex flex-col relative shadow-[0_0_15px_rgba(0,174,239,0.2)]">
            <div class="p-4 border-b border-gray-700 flex justify-between items-center">
                <h2 class="text-xl font-bold text-accent">謎リスト</h2>
                <button onclick="closeModal('modal-list')" class="text-gray-400 hover:text-white p-1">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div class="p-4 overflow-y-auto flex-1">
                <ul id="riddle-list" class="space-y-2">
                    <!-- JSで生成 -->
                </ul>
            </div>
        </div>
    </div>

    <!-- モーダル: クリア画面 -->
    <div id="modal-clear" class="modal hidden fixed inset-0 bg-black/90 z-50 flex items-center justify-center p-4">
        <div class="bg-gray-900 border border-yellow-500 rounded-xl w-full max-w-2xl text-center shadow-[0_0_20px_rgba(234,179,8,0.5)] p-8 flex flex-col items-center">
            <h1 class="text-4xl font-bold text-yellow-400 mb-6">GAME CLEAR!</h1>
            <p class="mb-6 text-lg text-white">おめでとうございます！全ての謎を解き明かしました。</p>
            
            <img src="./data/nazo/clear.png" alt="Clear Image" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';" class="max-w-full max-h-[40vh] object-contain mb-6 rounded border border-gray-600">
            <div class="hidden w-full h-40 bg-gray-800 border border-gray-600 rounded items-center justify-center mb-6 text-gray-500 flex-col">
                <span class="font-bold">clear.png</span>
                <span class="text-sm">ここに成功画像が表示されます</span>
            </div>

            <div class="flex gap-4 w-full justify-center mt-2">
                <button onclick="shareTwitter(true)" class="flex-1 bg-[#1DA1F2] hover:bg-[#1a91da] text-white font-bold py-3 px-4 rounded-lg transition flex items-center justify-center gap-2 max-w-xs">
                    <svg class="w-5 h-5 fill-current" viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
                    Xにつぶやく
                </button>
                <button onclick="closeModal('modal-clear')" class="flex-1 bg-gray-700 hover:bg-gray-600 text-white font-bold py-3 px-4 rounded-lg transition max-w-xs">
                    画像へ戻る
                </button>
            </div>
        </div>
    </div>
    
    <!-- ローディング用 -->
    <div id="loading-screen" class="fixed inset-0 bg-black z-[60] flex items-center justify-center hidden">
        <div class="text-accent text-xl font-bold animate-pulse">データを読み込み中...</div>
    </div>

    <script>
        // --- 1. 定数と状態管理 ---
        const SECRET_KEY = "nazo_ippai_secret_key_2026"; // 簡易的な暗号化キー
        
        const state = {
            playerName: '',
            isAdmin: false,
            isCleared: false,
            bgImg: null,
            imgBaseW: 2000,
            imgBaseH: 1500,
            riddles: [], // リスト用データ
            ansData: {}, // 復号された正解座標・ツールデータ
            solvedCount: 0,
            currentTargetId: null,
            isFramingMode: false,
            framedRect: null,
            camera: { x: 0.5, y: 0.5, zoom: 1.0 },
            tools: {
                frame: { active: false, x: 0.5, y: 0.5, size: 0.2, rotIdx: 0 },
                solid: { active: false, x: 0.5, y: 0.5, size: 0.2, rotIdx: 0 }
            },
            rotations: [0, 30, 45, 60],
            pointer: { active: false, startX: 0, startY: 0, currentX: 0, currentY: 0, dragDist: 0 },
            pinch: { active: false, initialDist: 0, initialZoom: 1, centerX: 0, centerY: 0 },
            dragTarget: null,
            hoverTarget: null
        };

        // --- 2. データ読み込み (Fetch & Fallback) ---
        async function loadGameResources() {
            document.getElementById('loading-screen').classList.remove('hidden');

            let loadSuccess = true;

            // 1. 画像の読み込み (svgを優先、失敗時はpng)
            try {
                state.bgImg = await loadExternalImageFallback(['./data/nazo/nazo.svg', './data/nazo/nazo.png']);
                state.imgBaseW = state.bgImg.width || 2000;
                state.imgBaseH = state.bgImg.height || 1500;
            } catch (e) {
                console.warn("画像の読み込みに失敗しました:", e);
                loadSuccess = false;
            }

            // 2. 問題リストの読み込み (CSV)
            try {
                const csvText = await fetchText('./data/nazo/list.csv');
                parseCSV(csvText);
            } catch (e) {
                console.warn("CSVの読み込みに失敗しました:", e);
                loadSuccess = false;
            }

            // 3. 正解データの読み込みと復号 (初回作成時は存在しないためエラーを無視)
            try {
                const encryptedAns = await fetchText('./data/nazo/ansdata.enc');
                decryptAnsData(encryptedAns);
            } catch (e) {
                console.warn("ansdata.encが見つかりません。新規作成として開始します。");
                // 新規作成時は空オブジェクトのまま進行するのでエラー扱いにしない
            }

            if (!loadSuccess) {
                console.warn("必須データ(画像またはCSV)が読み込めなかったため、ダミーデータを使用します。");
                setupDummyData();
            } else {
                console.log("外部データの読み込みに成功しました。");
            }

            document.getElementById('loading-screen').classList.add('hidden');
            resizeCanvas();
            
            // 初回読み込み時にカメラを中央・全体表示にリセット
            state.camera.x = 0.5;
            state.camera.y = 0.5;
            state.camera.zoom = getMinZoom();
            
            updateUI();
        }

        function loadExternalImageFallback(urls) {
            return new Promise((resolve, reject) => {
                let i = 0;
                const tryNext = () => {
                    if (i >= urls.length) return reject(new Error('All image loads failed'));
                    const img = new Image();
                    img.onload = () => resolve(img);
                    img.onerror = () => { i++; tryNext(); };
                    img.src = urls[i];
                };
                tryNext();
            });
        }

        async function fetchText(url) {
            const res = await fetch(url);
            if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
            return await res.text();
        }

        function parseCSV(csvText) {
            const result = Papa.parse(csvText, { header: true, skipEmptyLines: true });
            
            const categoryMap = {
                '1': 'none',
                '2': 'frame',
                '3': 'solid',
                '4': 'both'
            };

            state.riddles = result.data.map((row, index, arr) => ({
                id: parseInt(row.no),
                text: row.ans,
                category: categoryMap[row.type] || 'none',
                // 今回提供されたCSVには最終問題が含まれていないため、一時的にfalseで固定
                isFinal: false, 
                // 将来的に最終問題を復活させる場合は以下のように戻す
                // isFinal: index === arr.length - 1,
                solved: false
            }));
        }

        function decryptAnsData(encryptedText) {
            try {
                const bytes = CryptoJS.AES.decrypt(encryptedText, SECRET_KEY);
                const decryptedStr = bytes.toString(CryptoJS.enc.Utf8);
                state.ansData = JSON.parse(decryptedStr);
            } catch (e) {
                console.error("正解データの復号に失敗しました。キーが違うかデータが破損しています。");
                state.ansData = {};
            }
        }

        // ダミーデータ生成（ローカルテスト用）
        function setupDummyData() {
            // 背景が読み込めていない場合のみダミー背景生成
            if (!state.bgImg) {
                const c = document.createElement('canvas');
                c.width = 2000; c.height = 1500;
                const ctx = c.getContext('2d');
                ctx.fillStyle = '#0a0a0a'; ctx.fillRect(0, 0, c.width, c.height);
                ctx.strokeStyle = '#1a1a1a'; ctx.lineWidth = 2;
                for(let i=0; i<2000; i+=100) {
                    ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, 1500); ctx.stroke();
                    if(i<1500) { ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(2000, i); ctx.stroke(); }
                }
                ctx.fillStyle = '#ffffff'; ctx.font = 'bold 80px sans-serif';
                ctx.fillText('STAR', 300, 400);   
                ctx.fillStyle = '#00aeef'; ctx.fillRect(1200, 200, 150, 150); 
                ctx.fillStyle = '#ffffff'; ctx.fillText('MOON', 1210, 300);
                ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 5; ctx.strokeRect(800, 1000, 200, 200); 
                ctx.fillText('SUN', 830, 1120);
                
                const img = new Image();
                img.src = c.toDataURL();
                state.bgImg = img;
                state.imgBaseW = 2000; state.imgBaseH = 1500;
            }

            // リストが読み込めていない場合のみダミーリスト生成
            if (state.riddles.length === 0) {
                state.riddles = [
                    { id: 1, text: "夜空に輝くものは？", category: "none", solved: false, isFinal: false },
                    { id: 2, text: "青い四角の中にあるのは？", category: "solid", solved: false, isFinal: false },
                    { id: 3, text: "白い枠の中にあるのは？", category: "frame", solved: false, isFinal: false },
                    { id: 4, text: "両方の四角を使うと？", category: "both", solved: false, isFinal: false },
                    { id: 99, text: "【最終問題】全てを統合する言葉", category: "none", solved: false, isFinal: true }
                ];
            }

            // 正解データが空の場合のみダミー正解データ生成
            if (Object.keys(state.ansData).length === 0) {
                state.ansData = {
                    1: { target: {x: 0.14, y: 0.21, w: 0.15, h: 0.1} },
                    2: { target: {x: 0.6, y: 0.13, w: 0.1, h: 0.1}, solid: {x: 0.6, y: 0.18, size: 0.1, rotIdx: 0} },
                    3: { target: {x: 0.4, y: 0.66, w: 0.1, h: 0.13}, frame: {x: 0.45, y: 0.73, size: 0.15, rotIdx: 0} },
                    4: { target: {x: 0.5, y: 0.5, w: 0.2, h: 0.2}, frame: {x: 0.5, y:0.5, size: 0.3, rotIdx:0}, solid: {x: 0.5, y:0.5, size: 0.15, rotIdx:45} },
                    99: { target: {x: 0.0, y: 0.0, w: 1.0, h: 1.0} }
                };
            }
        }

        // --- 3. 音声再生 (エラー握りつぶし・WAV/MP3両対応) ---
        function playSE(type) {
            try {
                const audio = new Audio(`./data/deco/${type}.wav`);
                audio.play().catch(e => {
                    // wavがダメならmp3を試す
                    const audioMp3 = new Audio(`./data/deco/${type}.mp3`);
                    audioMp3.play().catch(err => { /* 両方ない場合は無視 */ });
                });
            } catch(e) {}
        }


        // --- 4. 描画・操作系 (プロトタイプから継承・微調整) ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        function getMinZoom() {
            if (!state.bgImg) return 0.2;
            const scaleW = canvas.width / state.imgBaseW;
            const scaleH = canvas.height / state.imgBaseH;
            // 画面に収まるサイズの75%を下限とする
            return Math.min(scaleW, scaleH) * 0.75; 
        }

        function getMaxZoom() {
            // 最大ズームは1000% (10倍)
            return 10.0;
        }

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            if (state.bgImg) {
                const minZ = getMinZoom();
                // 現在のズームが最小値より小さければ最小値にリセット
                if (state.camera.zoom < minZ) state.camera.zoom = minZ;
            }
            draw();
        }
        window.addEventListener('resize', resizeCanvas);

        function imgToScreen(ix, iy) {
            const sx = (ix * state.imgBaseW - state.camera.x * state.imgBaseW) * state.camera.zoom + canvas.width / 2;
            const sy = (iy * state.imgBaseH - state.camera.y * state.imgBaseH) * state.camera.zoom + canvas.height / 2;
            return { x: sx, y: sy };
        }
        function screenToImg(sx, sy) {
            const ix = (sx - canvas.width / 2) / state.camera.zoom / state.imgBaseW + state.camera.x;
            const iy = (sy - canvas.height / 2) / state.camera.zoom / state.imgBaseH + state.camera.y;
            return { x: ix, y: iy };
        }

        function draw() {
            ctx.fillStyle = '#050505'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            if (!state.bgImg) return;

            const topLeft = imgToScreen(0, 0);
            const w = state.imgBaseW * state.camera.zoom;
            const h = state.imgBaseH * state.camera.zoom;
            ctx.drawImage(state.bgImg, topLeft.x, topLeft.y, w, h);

            if (state.framedRect) {
                const rt = imgToScreen(state.framedRect.x, state.framedRect.y);
                const rw = state.framedRect.w * state.imgBaseW * state.camera.zoom;
                const rh = state.framedRect.h * state.imgBaseH * state.camera.zoom;
                ctx.fillStyle = 'rgba(0, 174, 239, 0.2)'; ctx.fillRect(rt.x, rt.y, rw, rh);
                ctx.strokeStyle = '#00aeef'; ctx.lineWidth = 2; ctx.strokeRect(rt.x, rt.y, rw, rh);

                // 微調整用ハンドルの描画（四隅のみ）
                ctx.fillStyle = '#ffffff';
                ctx.strokeStyle = '#00aeef';
                ctx.lineWidth = 2;
                const handles = [
                    {x: rt.x, y: rt.y}, {x: rt.x + rw, y: rt.y},         // 左上、右上
                    {x: rt.x, y: rt.y + rh}, {x: rt.x + rw, y: rt.y + rh} // 左下、右下
                ];
                handles.forEach(p => {
                    ctx.beginPath(); ctx.arc(p.x, p.y, 8, 0, Math.PI*2); ctx.fill(); ctx.stroke(); // サイズを少し大きく調整
                });
            }

            if (state.dragTarget === 'framing_new' && state.pointer.active) {
                const sStart = imgToScreen(state.pointer.startImgX, state.pointer.startImgY);
                ctx.fillStyle = 'rgba(0, 174, 239, 0.3)';
                ctx.fillRect(sStart.x, sStart.y, state.pointer.currentX - sStart.x, state.pointer.currentY - sStart.y);
            }

            drawTool('solid', state.tools.solid);
            drawTool('frame', state.tools.frame);
        }

        function drawTool(type, tool) {
            if (!tool.active) return;
            const center = imgToScreen(tool.x, tool.y);
            const pixelSize = tool.size * state.imgBaseW * state.camera.zoom;
            const angle = state.rotations[tool.rotIdx] * Math.PI / 180;

            ctx.save();
            ctx.translate(center.x, center.y);
            ctx.rotate(angle);

            if (type === 'solid') {
                // 塗りつぶし正方形の色を黒に変更
                ctx.fillStyle = 'rgba(0, 0, 0, 0.9)';
                ctx.fillRect(-pixelSize/2, -pixelSize/2, pixelSize, pixelSize);
            } else {
                // 枠のみ正方形を黒に変更
                ctx.strokeStyle = '#000000'; ctx.lineWidth = 4;
                ctx.strokeRect(-pixelSize/2, -pixelSize/2, pixelSize, pixelSize);
                ctx.fillStyle = 'rgba(0, 0, 0, 0.01)'; // 判定用にほぼ透明で塗る
                ctx.fillRect(-pixelSize/2, -pixelSize/2, pixelSize, pixelSize);
            }

            const corners = [{x: -pixelSize/2, y: -pixelSize/2}, {x: pixelSize/2, y: -pixelSize/2}, {x: pixelSize/2, y: pixelSize/2}, {x: -pixelSize/2, y: pixelSize/2}];
            ctx.fillStyle = '#00aeef';
            corners.forEach((c, idx) => {
                const isHovered = state.hoverTarget === `${type}_handle_${idx}`;
                const size = isHovered ? 12 : 8;
                ctx.beginPath(); ctx.arc(c.x, c.y, size, 0, Math.PI * 2); ctx.fill();
            });
            ctx.restore();
        }

        // --- 操作イベント (省略せず実装) ---
        function getPointerPos(e) { 
            if (e.touches && e.touches.length > 0) {
                return { x: e.touches[0].clientX, y: e.touches[0].clientY };
            }
            return { x: e.clientX, y: e.clientY }; 
        }

        function checkToolHit(px, py, type) {
            const tool = state.tools[type];
            if (!tool.active) return null;
            const center = imgToScreen(tool.x, tool.y);
            const pixelSize = tool.size * state.imgBaseW * state.camera.zoom;
            const angle = -state.rotations[tool.rotIdx] * Math.PI / 180;
            const dx = px - center.x; const dy = py - center.y;
            const lx = dx * Math.cos(angle) - dy * Math.sin(angle);
            const ly = dx * Math.sin(angle) + dy * Math.cos(angle);
            const half = pixelSize / 2; const handleRadius = 20;

            const corners = [{x: -half, y: -half, idx: 0}, {x: half, y: -half, idx: 1}, {x: half, y: half, idx: 2}, {x: -half, y: half, idx: 3}];
            for (let c of corners) {
                if (Math.hypot(lx - c.x, ly - c.y) < handleRadius) return { target: `${type}_scale`, handleIdx: c.idx };
            }
            if (lx >= -half && lx <= half && ly >= -half && ly <= half) return { target: `${type}_move` };
            return null;
        }

        function checkFramingHit(px, py) {
            if (!state.framedRect) return null;
            const rt = imgToScreen(state.framedRect.x, state.framedRect.y);
            const rw = state.framedRect.w * state.imgBaseW * state.camera.zoom;
            const rh = state.framedRect.h * state.imgBaseH * state.camera.zoom;
            const handleRadius = 30; // 判定半径を大きくして押しやすくする
            
            // 四隅のみ判定
            const corners = [
                { id: 'framing_scale_nw', x: rt.x, y: rt.y },
                { id: 'framing_scale_ne', x: rt.x + rw, y: rt.y },
                { id: 'framing_scale_sw', x: rt.x, y: rt.y + rh },
                { id: 'framing_scale_se', x: rt.x + rw, y: rt.y + rh }
            ];
            for (let c of corners) {
                if (Math.hypot(px - c.x, py - c.y) < handleRadius) return c.id;
            }
            
            // 辺と内部の判定は削除
            return null;
        }

        function onPointerDown(e) {
            if (e.target !== canvas) return;

            if (e.touches && e.touches.length === 2) {
                state.pinch.active = true;
                const dx = e.touches[0].clientX - e.touches[1].clientX;
                const dy = e.touches[0].clientY - e.touches[1].clientY;
                state.pinch.initialDist = Math.hypot(dx, dy);
                state.pinch.initialZoom = state.camera.zoom;
                state.pinch.centerX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
                state.pinch.centerY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
                return;
            }

            const pos = getPointerPos(e);
            const imgPos = screenToImg(pos.x, pos.y);
            state.pointer.active = true; state.pointer.startX = pos.x; state.pointer.startY = pos.y;
            state.pointer.startImgX = imgPos.x;
            state.pointer.startImgY = imgPos.y;
            state.pointer.currentX = pos.x; state.pointer.currentY = pos.y;
            state.pointer.dragDist = 0;

            const fHit = checkFramingHit(pos.x, pos.y);
            const tHit = checkToolHit(pos.x, pos.y, 'solid') || checkToolHit(pos.x, pos.y, 'frame');

            if (fHit) {
                state.dragTarget = fHit;
                toggleFramingMode(false); // 新規囲みモードを解除して微調整モードへ
                return;
            }

            if (state.isFramingMode) { state.dragTarget = 'framing_new'; return; }
            if (tHit) { state.dragTarget = tHit.target; return; }
            state.dragTarget = 'bg';
        }

        function onPointerMove(e) {
            if (e.touches && e.touches.length === 2 && state.pinch.active) {
                const dx = e.touches[0].clientX - e.touches[1].clientX;
                const dy = e.touches[0].clientY - e.touches[1].clientY;
                const currentDist = Math.hypot(dx, dy);
                
                if (state.pinch.initialDist > 0) {
                    const zoomAmount = currentDist / state.pinch.initialDist;
                    const minZ = getMinZoom();
                    const maxZ = getMaxZoom();
                    const newZoom = Math.max(minZ, Math.min(state.pinch.initialZoom * zoomAmount, maxZ));
                    
                    const imgPosBefore = screenToImg(state.pinch.centerX, state.pinch.centerY);
                    state.camera.zoom = newZoom;
                    const imgPosAfter = screenToImg(state.pinch.centerX, state.pinch.centerY);
                    
                    state.camera.x += (imgPosBefore.x - imgPosAfter.x);
                    state.camera.y += (imgPosBefore.y - imgPosAfter.y);
                }
                draw();
                return;
            }

            const pos = getPointerPos(e);
            if (!state.pointer.active && e.type === 'mousemove') {
                const fHit = checkFramingHit(pos.x, pos.y);
                const tHit = checkToolHit(pos.x, pos.y, 'solid') || checkToolHit(pos.x, pos.y, 'frame');
                state.hoverTarget = tHit && tHit.target.includes('scale') ? tHit.target.split('_')[0] + '_handle_' + tHit.handleIdx : null;
                
                if (fHit) {
                    // 四隅のみ対応
                    if (fHit.includes('nw') || fHit.includes('se')) canvas.style.cursor = 'nwse-resize';
                    else if (fHit.includes('ne') || fHit.includes('sw')) canvas.style.cursor = 'nesw-resize';
                } else {
                    canvas.style.cursor = tHit ? (tHit.target.includes('scale') ? 'pointer' : 'move') : (state.isFramingMode ? 'crosshair' : 'default');
                }
                draw();
            }
            if (!state.pointer.active) return;
            
            const dx = pos.x - state.pointer.currentX; const dy = pos.y - state.pointer.currentY;
            state.pointer.dragDist += Math.hypot(pos.x - state.pointer.startX, pos.y - state.pointer.startY);
            state.pointer.currentX = pos.x; state.pointer.currentY = pos.y;

            if (state.dragTarget === 'bg') {
                state.camera.x -= dx / (state.imgBaseW * state.camera.zoom);
                state.camera.y -= dy / (state.imgBaseH * state.camera.zoom);
            } else if (state.dragTarget.includes('_move')) {
                const type = state.dragTarget.split('_')[0];
                state.tools[type].x += dx / (state.imgBaseW * state.camera.zoom);
                state.tools[type].y += dy / (state.imgBaseH * state.camera.zoom);
            } else if (state.dragTarget.includes('_scale')) {
                const type = state.dragTarget.split('_')[0];
                const center = imgToScreen(state.tools[type].x, state.tools[type].y);
                const dist = Math.hypot(pos.x - center.x, pos.y - center.y);
                let newPixelSize = Math.max(50, Math.min((dist * 2) / Math.SQRT2, 1000));
                state.tools[type].size = newPixelSize / (state.imgBaseW * state.camera.zoom);
            } else if (state.dragTarget.startsWith('framing_scale_')) {
                // 四隅のドラッグによるリサイズ処理を復活
                const dir = state.dragTarget.split('_')[2];
                const dxImg = dx / (state.imgBaseW * state.camera.zoom);
                const dyImg = dy / (state.imgBaseH * state.camera.zoom);
                
                let {x, y, w, h} = state.framedRect;
                
                // ドラッグ方向に応じて座標とサイズを更新
                if (dir.includes('n')) { y += dyImg; h -= dyImg; }
                if (dir.includes('s')) { h += dyImg; }
                if (dir.includes('w')) { x += dxImg; w -= dxImg; }
                if (dir.includes('e')) { w += dxImg; }
                
                // サイズが負になった時の反転対応（ドラッグターゲットも反転させる）
                if (w < 0) { 
                    x += w; w = Math.abs(w); 
                    state.dragTarget = state.dragTarget.replace('w', 'X').replace('e', 'w').replace('X', 'e'); 
                }
                if (h < 0) { 
                    y += h; h = Math.abs(h); 
                    state.dragTarget = state.dragTarget.replace('n', 'X').replace('s', 'n').replace('X', 's'); 
                }
                
                state.framedRect = {x, y, w, h};
            }
            draw();
        }

        function onPointerUp(e) {
            if (e.touches && e.touches.length < 2) {
                state.pinch.active = false;
            }
            if (e.touches && e.touches.length === 1 && state.pointer.active) {
                const pos = getPointerPos(e);
                state.pointer.currentX = pos.x;
                state.pointer.currentY = pos.y;
                return;
            }

            if (!state.pointer.active) return;
            if (state.dragTarget && state.dragTarget.includes('_scale') && state.pointer.dragDist < 20) {
                const type = state.dragTarget.split('_')[0];
                state.tools[type].rotIdx = (state.tools[type].rotIdx + 1) % 4;
            }
            if (state.dragTarget === 'framing_new') {
                const endImgPos = screenToImg(state.pointer.currentX, state.pointer.currentY);
                const w = Math.abs(endImgPos.x - state.pointer.startImgX);
                const h = Math.abs(endImgPos.y - state.pointer.startImgY);
                if (w > 0.01 && h > 0.01) {
                    state.framedRect = { x: Math.min(state.pointer.startImgX, endImgPos.x), y: Math.min(state.pointer.startImgY, endImgPos.y), w, h };
                }
                toggleFramingMode(false);
            }
            state.pointer.active = false; state.dragTarget = null;
            draw();
        }

        function onWheel(e) {
            e.preventDefault();
            const zoomAmount = e.deltaY > 0 ? 0.9 : 1.1;
            const pos = getPointerPos(e);
            const imgPosBefore = screenToImg(pos.x, pos.y);
            const minZ = getMinZoom();
            const maxZ = getMaxZoom();
            state.camera.zoom = Math.max(minZ, Math.min(state.camera.zoom * zoomAmount, maxZ));
            const imgPosAfter = screenToImg(pos.x, pos.y);
            state.camera.x += (imgPosBefore.x - imgPosAfter.x);
            state.camera.y += (imgPosBefore.y - imgPosAfter.y);
            draw();
        }

        canvas.addEventListener('mousedown', onPointerDown); canvas.addEventListener('mousemove', onPointerMove); window.addEventListener('mouseup', onPointerUp);
        canvas.addEventListener('touchstart', onPointerDown, {passive: false}); canvas.addEventListener('touchmove', (e) => { e.preventDefault(); onPointerMove(e); }, {passive: false}); window.addEventListener('touchend', onPointerUp);
        canvas.addEventListener('wheel', onWheel, {passive: false});


        // --- 5. ゲームロジック ---
        function startGame() {

            if (CryptoJS.SHA256(nameInput).toString() === adminHash) {
                state.isAdmin = true;
                state.playerName = 'Admin';

            } else {

            closeModal('modal-name');

        }

        function toggleTool(type) {
            state.tools[type].active = !state.tools[type].active;
            const btn = document.getElementById(`btn-tool-${type}`);
            btn.classList.toggle('bg-accent/50', state.tools[type].active);
            btn.classList.toggle('border-accent', state.tools[type].active);
            if (state.tools[type].active) {
                state.tools[type].x = state.camera.x;
                state.tools[type].y = state.camera.y;
            }
            draw();
        }

        function toggleFramingMode(forceState = null) {
            if (state.currentTargetId === null) { showAlert('リストから「探す」問題を選んでください'); return; }
            state.isFramingMode = forceState !== null ? forceState : !state.isFramingMode;
            const btn = document.getElementById('btn-frame');
            btn.classList.toggle('bg-accent', state.isFramingMode);
            btn.classList.toggle('border-white', state.isFramingMode);
            btn.classList.toggle('bg-black/80', !state.isFramingMode);
            canvas.style.cursor = state.isFramingMode ? 'crosshair' : 'default';

        function renderList() {
            const ul = document.getElementById('riddle-list');
            ul.innerHTML = '';
            
            const groups = {
                'none': { title: 'なし', items: [] },

                'both': { title: '🔲⬛', items: [] }
            };
            let finalRiddle = null;
            let totalNormal = 0;
            let solvedNormal = 0;

            // 全体の問題数（進捗表示用）
            const totalRiddles = state.riddles.length;

            // 謎をグループ分け
            state.riddles.forEach(r => {

                } else {

                    totalNormal++;
                    if(r.solved) solvedNormal++;
                }
            });

            // 進捗表示の更新削除（上で一括計算するため）

            // グループごとにリスト表示
            const categoryOrder = ['none', 'frame', 'solid', 'both'];
            categoryOrder.forEach(cat => {

                header.innerHTML = `<span>👑 最終問題</span>`;
                ul.appendChild(header);
                ul.appendChild(createRiddleListItem(finalRiddle));
                if(solvedNormal === totalNormal && !finalRiddle.solved && !state.isAdmin) {
                     showAlert('最終問題が出現しました！リストを確認してください。');

        function createRiddleListItem(r) {

        // --- 判定ロジック ---
        function calcIoU(r1, r2) {
            const x1 = Math.max(r1.x, r2.x), y1 = Math.max(r1.y, r2.y);
            const x2 = Math.min(r1.x + r1.w, r2.x + r2.w), y2 = Math.min(r1.y + r1.h, r2.y + r2.h);
            const i = Math.max(0, x2 - x1) * Math.max(0, y2 - y1);
            return i / (r1.w * r1.h + r2.w * r2.h - i);
        }

        function isToolMatched(toolType, requiredData) {
            if (!requiredData) return true; // そのツールは判定不要
            const t = state.tools[toolType];
            if (!t.active) return false; // ツールが出ていない
            
            // 許容誤差: 位置とサイズは5%ズレまでOK。回転は完全一致。
            const TOLERANCE = 0.05;
            if (Math.abs(t.x - requiredData.x) > TOLERANCE) return false;
            if (Math.abs(t.y - requiredData.y) > TOLERANCE) return false;
            if (Math.abs(t.size - requiredData.size) > TOLERANCE) return false;
            if (t.rotIdx !== requiredData.rotIdx) return false;
            return true;
        }

        function judgeAnswer() {
            if (!state.currentTargetId || !state.framedRect) { showAlert('領域を囲んでください'); return; }

            const targetRiddle = state.riddles.find(r => r.id === state.currentTargetId);
            const correctData = state.ansData[state.currentTargetId];
            
            if (!correctData) {
                showAlert('エラー：正解データが読み込まれていません');
                return;
            }

            // 1. 囲み領域の判定 (IoU 40%以上で許容)
            const iou = calcIoU(state.framedRect, correctData.target);
            let isCorrect = (iou > 0.4);

            // 2. ツールの判定 (指定カテゴリに応じて)
            if (isCorrect) {
                if (targetRiddle.category === 'frame' || targetRiddle.category === 'both') {
                    if (!isToolMatched('frame', correctData.frame)) isCorrect = false;
                }
                if (targetRiddle.category === 'solid' || targetRiddle.category === 'both') {
                    if (!isToolMatched('solid', correctData.solid)) isCorrect = false;
                }
            }

            if (isCorrect) {
                playSE('cor');
                targetRiddle.solved = true;
                state.solvedCount++;
                state.currentTargetId = null;
                state.framedRect = null;
                document.getElementById('btn-judge').classList.add('hidden');
                document.getElementById('current-target-display').classList.add('hidden'); // ターゲット表示を隠す
                
                showAlert('正解！');
                updateUI();
                
                // 全問正解チェック
                const isAllCleared = state.riddles.every(r => r.solved);
                if (isAllCleared && !state.isCleared) {
                    state.isCleared = true;
                    setTimeout(showClear, 1000);
                    document.getElementById('btn-show-clear').classList.remove('hidden');
                }
            } else {
                playSE('inc');
                showAlert('不正解...');
                state.framedRect = null;
            }
            draw();
        }

        // --- 6. 管理者機能 ---
        function adminSaveData() {
            if (!state.currentTargetId || !state.framedRect) {
                showAlert("エラー: 「囲む」で正解領域を指定してください。");
                return;
            }

            const currentData = { target: state.framedRect };
            
            if (state.tools.frame.active) {
                currentData.frame = { x: state.tools.frame.x, y: state.tools.frame.y, size: state.tools.frame.size, rotIdx: state.tools.frame.rotIdx };
            }
            if (state.tools.solid.active) {
                currentData.solid = { x: state.tools.solid.x, y: state.tools.solid.y, size: state.tools.solid.size, rotIdx: state.tools.solid.rotIdx };
            }

            state.ansData[state.currentTargetId] = currentData;
            
            showAlert(`問題ID: ${state.currentTargetId} のデータを一時保存しました`);
            document.getElementById('btn-admin-save').classList.add('hidden');

        function exportAdminData() {
            if (Object.keys(state.ansData).length === 0) {
                alert("保存されたデータがありません。リストから問題を選び、設定を保存してください。");
                return;
            }
            
            // JSON化してAES暗号化
            const jsonStr = JSON.stringify(state.ansData);
            const encrypted = CryptoJS.AES.encrypt(jsonStr, SECRET_KEY).toString();

            // ダウンロードトリガー
            const blob = new Blob([encrypted], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'ansdata.enc';
            a.click();
            URL.revokeObjectURL(url);
            
            alert(`暗号化ファイル(ansdata.enc)をダウンロードしました。githubの /data/nazo/ フォルダに配置してください。`);
        }

    </script>
</body>
</html>
